<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thalassian Translator | Sin'dorei Engine</title>
    <meta name="description" content="The official Canon-First Thalassian Language Translator. Translate English into the language of the Blood Elves (Sin'dorei), High Elves, and Void Elves.">
    <meta name="keywords" content="World of Warcraft, WoW, Thalassian, Translator, Blood Elf, Void Elf, High Elf, Conlang, Midnight, 12.0">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mikekovetsky.github.io/thalassian/">

    <meta property="og:image" content="https://raw.githubusercontent.com/MikeKovetsky/thalassian/main/docs/methodology/assets/preview.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mikekovetsky.github.io/thalassian/">
    <meta property="twitter:title" content="Thalassian Translator | Sin'dorei Engine">
    <meta property="twitter:description" content="The most comprehensive Thalassian language translator. Translate English to Elvish using a canonical database from World of Warcraft.">
    <meta property="twitter:image" content="https://raw.githubusercontent.com/MikeKovetsky/thalassian/main/docs/methodology/assets/preview.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <style>
/* ... adding pill styles ... */
        .pill-container {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .pill-btn {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            border: 1px solid var(--border-subtle);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .pill-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--accent-gold);
            transform: translateY(-1px);
        }
        :root {
            /* Portal AI inspired modern dark theme with subtle gold/ruby accents */
            --bg-main: #0B0B0E;
            --bg-panel: rgba(25, 20, 24, 0.6);
            --bg-input: rgba(10, 8, 12, 0.8);
            --text-main: #EAE0D5;
            --text-muted: #A09080;
            --accent-gold: #D4AF37;
            --accent-gold-glow: rgba(212, 175, 55, 0.3);
            --accent-ruby: #9B2226;
            --accent-ruby-glow: rgba(155, 34, 38, 0.5);
            --border-subtle: rgba(212, 175, 55, 0.15);
            --border-focus: rgba(212, 175, 55, 0.6);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(155, 34, 38, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to bottom right, #FFFFFF 20%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px var(--accent-gold-glow));
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .glass-container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: fadeInUp 1s ease-out;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .mode-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-selector label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--accent-gold);
            letter-spacing: 0.05em;
        }

        select, input[type="password"] {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        select {
            cursor: pointer;
            appearance: none;
            padding-right: 30px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23D4AF37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        select:hover, input[type="password"]:focus, select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 10px var(--accent-gold-glow);
        }

        .api-key-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .api-key-container input {
            width: 240px;
            font-family: monospace;
        }

        .api-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            max-width: 200px;
            line-height: 1.4;
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .translator-grid {
                grid-template-columns: 1fr;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
            .mode-selector {
                flex-direction: column;
                align-items: flex-start;
            }
            .mode-selector select {
                width: 100%;
            }
            .api-key-container {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }
            .api-key-container input {
                width: 100%;
            }
            h1 { font-size: 2rem; }
            .glass-container { padding: 20px; }
        }

        .io-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .io-box label {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 48px;
        }

        .label-text-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            justify-content: center;
        }

        .label-hint {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            text-transform: none;
            color: #665;
            letter-spacing: 0;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 15px var(--accent-gold-glow);
        }

        textarea::placeholder {
            color: #554A40;
            font-weight: 300;
        }

        #output-text {
            background: rgba(212, 175, 55, 0.02);
            color: var(--accent-gold);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .runic-text {
            font-family: 'Tangerine', cursive !important;
            font-size: 2.2rem !important;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            letter-spacing: 0.05em;
            line-height: 1.2 !important;
        }

        button.btn-translate {
            background: linear-gradient(135deg, var(--accent-ruby) 0%, #5A1015 100%);
            color: #FFF;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        button.btn-translate::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        button.btn-translate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-ruby-glow), 0 0 0 1px var(--accent-gold);
        }

        button.btn-translate:hover::before {
            left: 150%;
        }

        button.btn-translate:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeIn 2s ease-out;
        }

        .lexicon-status {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .lexicon-status span {
            color: var(--accent-gold);
            font-weight: 600;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: #FFF;
            text-shadow: 0 0 10px var(--accent-gold-glow);
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #FFF;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Thalassian Translator</h1>
        <div class="subtitle">Sin'dorei Linguistic Engine (Canon-First)</div>
    </div>

    <div class="glass-container">
        <div class="controls-row">
            <div class="mode-selector">
                <label for="direction">Direction</label>
                <select id="direction" onchange="updateLabels()">
                    <option value="to_th">English / UKR → Thalassian</option>
                    <option value="from_th">Thalassian → English</option>
                </select>
            </div>
            
            <div class="mode-selector">
                <label for="mode">Engine Mode</label>
                <select id="mode" onchange="toggleApiKey()">
                    <option value="2">Strict Programmatic (Local Lexicon)</option>
                    <option value="3">Hybrid Gap-Fill (Requires OpenAI Key)</option>
                    <option value="1">Pure LLM Driven (Requires OpenAI Key)</option>
                </select>
                <div style="margin-left: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="runic-toggle" onchange="toggleRunes()" style="cursor: pointer;" checked>
                        <label for="runic-toggle" style="cursor: pointer; text-transform: none; color: var(--text-muted);">Show in Elvish Runes</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" id="canon-toggle" style="cursor: pointer;">
                        <label for="canon-toggle" style="cursor: pointer; text-transform: none; color: var(--text-muted);" title="If checked, restricts dictionary and LLM to officially confirmed Blizzard lore words only.">Canon Only</label>
                    </div>
                </div>
            </div>
            
            <div class="api-key-container" id="apiKeyContainer" style="display: none;">
                <input type="password" id="apiKey" placeholder="sk-proj-..." autocomplete="off" spellcheck="false">
                <div class="api-note">Key is used locally in browser memory for OpenAI API calls.</div>
            </div>
        </div>

        <div class="translator-grid">
            <div class="io-box">
                <label for="input-text">
                    <div class="label-text-group">
                        <span id="label-input">English / Ukrainian</span>
                    </div>
                </label>
                <textarea id="input-text" placeholder="Enter text to translate...&#10;e.g., The sun guides us."></textarea>
                <div class="pill-container" id="pills-container">
                    <button class="pill-btn" onclick="fillAndTranslate('The sun guides us.')">The sun guides us</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Justice for our great people!')">Justice for our great people</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Taste the chill of true death!')">Taste the chill of true death</button>
                </div>
            </div>
            <div class="io-box">
                <label for="output-text">
                    <div class="label-text-group">
                        <span id="label-output">Thalassian (Elvish)</span>
                    </div>
                </label>
                <textarea id="output-text" class="runic-text" readonly placeholder="Translation will manifest here..."></textarea>
            </div>
        </div>

        <button class="btn-translate" onclick="translateText()">
            <span id="btn-text">Translate</span>
            <div class="loading-spinner" id="loading-spinner"></div>
        </button>
    </div>

    <div class="footer">
        <div class="lexicon-status">
            Connected to Sunwell. <span id="lexicon-count">0</span> roots loaded.
        </div>
        <div class="footer-links" style="display: flex; gap: 20px; margin-top: 10px;">
            <a href="dictionary.html" class="nav-link">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Browse Lexicon Database
            </a>
            <a href="https://github.com/MikeKovetsky/thalassian" target="_blank" class="nav-link">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                View Source & Lore
            </a>
        </div>
        <div style="margin-top: 15px; font-size: 0.8rem; color: #665; letter-spacing: 0.05em;">
            Architected by an autonomous agent powered by <a href="https://t.me/portal_open_bot?start=P-MB6939" target="_blank" style="color: var(--accent-ruby); text-decoration: none; font-weight: 600; text-shadow: 0 0 5px var(--accent-ruby-glow);">Portal OS</a>.
        </div>
    </div>

    <script>
        let lexiconData = [];

        window.onload = async () => {
            try {
                const response = await fetch('../src/thalassian/data/lexicon.json');
                lexiconData = await response.json();
                document.getElementById('lexicon-count').innerText = lexiconData.length;
            } catch (error) {
                try {
                    const response = await fetch('https://raw.githubusercontent.com/MikeKovetsky/thalassian/main/src/thalassian/data/lexicon.json');
                    lexiconData = await response.json();
                    document.getElementById('lexicon-count').innerText = lexiconData.length;
                } catch (e) {
                    document.getElementById('output-text').value = "Error connecting to lexicon database.";
                }
            }
        };

        function toggleApiKey() {
            const mode = document.getElementById('mode').value;
            const keyContainer = document.getElementById('apiKeyContainer');
            if (mode === "1" || mode === "3") {
                keyContainer.style.display = 'flex';
                keyContainer.style.animation = 'fadeIn 0.3s ease-out';
            } else {
                keyContainer.style.display = 'none';
            }
        }

        function fillAndTranslate(text) {
            document.getElementById('input-text').value = text;
            translateText();
        }

        function updateLabels() {
            const dir = document.getElementById('direction').value;
            const lblIn = document.getElementById('label-input');
            const lblOut = document.getElementById('label-output');
            const boxIn = document.getElementById('input-text');
            const boxOut = document.getElementById('output-text');
            const modeSelect = document.getElementById('mode');
            const pillsContainer = document.getElementById('pills-container');
            
            const currentIn = boxIn.value;
            const currentOut = boxOut.value;
            
            if (currentIn || currentOut) {
                // If it's an error message or loading state, don't put it in input
                if (!currentOut.includes("Error") && !currentOut.includes("...")) {
                    boxIn.value = currentOut;
                    boxOut.value = currentIn;
                } else {
                    boxIn.value = currentIn;
                    boxOut.value = "";
                }
            }

            if (dir === "to_th") {
                lblIn.innerText = "English / Ukrainian";
                lblOut.innerText = "Thalassian (Elvish)";
                boxIn.placeholder = "Enter text to translate...\ne.g., The sun guides us.";
                pillsContainer.innerHTML = `
                    <button class="pill-btn" onclick="fillAndTranslate('The sun guides us.')">The sun guides us</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Justice for our great people!')">Justice for our great people</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Taste the chill of true death!')">Taste the chill of true death</button>
                `;
            } else {
                lblIn.innerText = "Thalassian (Elvish)";
                lblOut.innerText = "English (Translated)";
                boxIn.placeholder = "Enter Elvish to translate...\ne.g., Belore dela'na.";
                pillsContainer.innerHTML = `
                    <button class="pill-btn" onclick="fillAndTranslate('Anu belore dela\\'na.')">Anu belore dela'na</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Selama ashal\\'anore!')">Selama ashal'anore</button>
                    <button class="pill-btn" onclick="fillAndTranslate('Bal\\'a dash, malanore.')">Bal'a dash, malanore</button>
                `;
            }
        }

        // Extremely naive JS-based exact matching (Mode 2)
        function toggleRunes() {
            const outputBox = document.getElementById('output-text');
            if (document.getElementById('runic-toggle').checked) {
                outputBox.classList.add('runic-text');
            } else {
                outputBox.classList.remove('runic-text');
            }
        }

        // Detects if text is primarily Thalassian (lots of apostrophes, vowels, known roots)
        function isThalassian(text) {
            let matches = 0;
            const words = text.toLowerCase().split(/[ \.,!?]+/);
            for (let w of words) {
                if (w.includes("'")) matches += 2;
                if (lexiconData.find(e => e.word === w || e.word === w.split("'")[0])) matches += 3;
            }
            return matches >= 3;
        }

        function reverseTranslate(text) {
            const pronounPrefixes = { "na": "us", "anu": "we", "a": "you", "o": "me", "dan": "them", "danu": "they" };
            
            // Split keeping punctuation
            const tokens = text.match(/[A-Za-z\']+|[.,!?;]/g) || [];
            let translated = [];

            const canonOnly = document.getElementById('canon-toggle').checked;
            
            for (let word of tokens) {
                if (/[.,!?;]/.test(word)) {
                    if (translated.length > 0) translated[translated.length-1] += word;
                    continue;
                }

                let subWords = word.toLowerCase().split("'");
                for (let i=0; i<subWords.length; i++) {
                    let w = subWords[i];
                    if (i > 0 && pronounPrefixes[w]) {
                        translated.push(pronounPrefixes[w]);
                        continue;
                    }

                    let found = lexiconData.find(e => {
                        if (canonOnly && !e.canon) return false;
                        return e.word === w || e.word + "i" === w || e.word.slice(0,-1)+"ei" === w;
                    });
                    if (found) {
                        let t = found.translation.en;
                        if (w.endsWith("i") && found.pos === "noun") t += "(s)";
                        translated.push(t);
                    } else {
                        translated.push(`[${w}]`);
                    }
                }
            }
            return translated.join(" ").replace(/ ([.,!?;])/g, "$1");
        }

        function strictTranslate(text) {
            const dropWords = ["для", "в", "до", "на", "з", "за", "від", "про", "і", "та", "але", "for", "to", "the", "a", "an", "and", "of", "in", "on", "with", "by", "but"];
            const pronounSuffixes = {
                "нас": "na", "ми": "anu", "нам": "na", "us": "na", "we": "anu",
                "ти": "a", "тобі": "a", "тебе": "a", "you": "a",
                "я": "o", "мені": "o", "мене": "o", "i": "o", "me": "o",
                "їх": "dan", "вони": "danu", "them": "dan", "they": "danu"
            };

            const tokens = text.match(/[A-Za-zА-Яа-яЄєІіЇїҐґ\']+|[.,!?;]/g) || [];
            let translated = [];
            
            for (let i = 0; i < tokens.length; i++) {
                let word = tokens[i];
                if (/[.,!?;]/.test(word)) {
                    if (translated.length > 0) translated[translated.length-1] += word;
                    continue;
                }

                let lower = word.toLowerCase();
                if (dropWords.includes(lower)) continue;

                let suffix = "";
                if (i + 1 < tokens.length) {
                    let nextWord = tokens[i+1].toLowerCase();
                    if (pronounSuffixes[nextWord]) {
                        suffix = "'" + pronounSuffixes[nextWord];
                        i++; 
                    }
                }

                const canonOnly = document.getElementById('canon-toggle').checked;
                let found = lexiconData.find(e => {
                    if (canonOnly && !e.canon) return false;
                    let uk = e.translation.uk.toLowerCase().split(/[^\wа-яєіїґ\']+/);
                    let en = e.translation.en.toLowerCase().split(/[^\w']+/);
                    return uk.includes(lower) || en.includes(lower) || 
                           (lower.endsWith('и') && uk.includes(lower.slice(0,-1))) ||
                           (lower.endsWith('s') && en.includes(lower.slice(0,-1)));
                });

                if (found) {
                    let elven = found.word;
                    if (translated.length === 0 || (translated.length > 0 && /[.!?;]$/.test(translated[translated.length-1]))) {
                        elven = elven.charAt(0).toUpperCase() + elven.slice(1);
                    }
                    translated.push(elven + suffix);
                } else {
                    translated.push(`[${word}]${suffix}`);
                }
            }

            return translated.join(" ").replace(/ ([.,!?;])/g, "$1");
        }

        async function translateText() {
            const input = document.getElementById('input-text').value.trim();
            if (!input) return;

            const mode = document.getElementById('mode').value;
            const outputBox = document.getElementById('output-text');
            const apiKey = document.getElementById('apiKey').value.trim();
            
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('loading-spinner');

            if ((mode === "1" || mode === "3") && !apiKey) {
                alert("Please enter an OpenAI API key to unlock the LLM engine.");
                document.getElementById('apiKey').focus();
                return;
            }

            // --- Execution Logic ---
            const dir = document.getElementById('direction').value;

            if (mode === "2") {
                if (dir === "from_th") {
                    outputBox.value = reverseTranslate(input);
                } else {
                    outputBox.value = strictTranslate(input);
                }
                return;
            }

            // UI Loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            outputBox.value = "";
            
            try {
                let prompt = "";
                if (mode === "1") {
                    const canonOnly = document.getElementById('canon-toggle').checked;
                    let filteredSample = lexiconData;
                    if (canonOnly) filteredSample = lexiconData.filter(e => e.canon);
                    const sample = filteredSample.map(e => `${e.word}=${e.translation.en}`).join(", ");
                    
                    if (dir === "to_th") {
                        prompt = `You are an expert Thalassian linguist. Translate the following text to Thalassian Elvish: "${input}"
Use ONLY roots from this exact lexicon: ${sample}
Do NOT invent new roots unless absolutely necessary.
Rules: Agglutinative (pronouns attach as suffixes to verbs with apostrophes: me/I='o, us='na, you='a), SVO word order, drop prepositions, adjectives before nouns. 
Return ONLY the raw translated Thalassian text. Do NOT wrap the translation in quotation marks. Do NOT provide explanations.`;
                    } else {
                        prompt = `You are an expert Thalassian linguist. Translate the following Thalassian Elvish text into English: "${input}"
Use this exact lexicon reference: ${sample}
Return ONLY the raw translated English text. Do NOT wrap the translation in quotation marks. Do NOT provide explanations.`;
                    }
                } else if (mode === "3") {
                    let draft = dir === "to_th" ? strictTranslate(input) : reverseTranslate(input);
                    if (!draft.includes("[")) {
                        outputBox.value = draft;
                        return;
                    }
                    const gapsMatch = draft.match(/\[(.*?)\]/g) || [];
                    const gaps = gapsMatch.map(g => g.replace(/\[|\]/g, ''));
                    
                    if (dir === "to_th") {
                        prompt = `Here is a drafted Thalassian sentence with missing words in brackets: "${draft}". 
The missing words mean: ${gaps.join(", ")}. 
Invent new Thalassian roots for these words using Elvish phonotactics (lots of vowels, soft consonants l, r, s, sh, th). 
Return ONLY the completed sentence without brackets.`;
                    } else {
                        prompt = `Here is a drafted English sentence translated from Thalassian, with unknown untranslated words in brackets: "${draft}".
The unknown Thalassian words are: ${gaps.join(", ")}.
Based on context and fantasy elven lore, provide a smooth, coherent English translation guessing the meaning of the bracketed words.
Return ONLY the completed English sentence without brackets.`;
                    }
                }

                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-5-mini",
                        messages: [{role: "system", content: prompt}]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                outputBox.value = data.choices[0].message.content.trim();
            } catch (err) {
                outputBox.value = `Engine Error: ${err.message}`;
            } finally {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }
    </script>
