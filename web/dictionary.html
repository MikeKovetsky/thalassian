<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon Database | Thalassian Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0B0B0E;
            --bg-panel: rgba(25, 20, 24, 0.6);
            --bg-input: rgba(10, 8, 12, 0.8);
            --text-main: #EAE0D5;
            --text-muted: #A09080;
            --accent-gold: #D4AF37;
            --accent-gold-glow: rgba(212, 175, 55, 0.3);
            --accent-ruby: #9B2226;
            --border-subtle: rgba(212, 175, 55, 0.15);
            --radius-lg: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(155, 34, 38, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to bottom right, #FFFFFF 20%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px var(--accent-gold-glow));
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .glass-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
        }

        .nav-links a:hover {
            color: #FFF;
            border-bottom: 1px solid var(--accent-gold);
            text-shadow: 0 0 10px var(--accent-gold-glow);
        }

        .search-bar {
            width: 100%;
            margin-bottom: 30px;
        }

        .search-bar input {
            width: 100%;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            outline: none;
            transition: var(--transition);
        }

        .search-bar input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold-glow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        th {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            letter-spacing: 0.05em;
            background: rgba(212, 175, 55, 0.05);
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        tr {
            transition: background 0.2s;
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .canon-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .canon-true {
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent-gold);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .canon-false {
            background: rgba(155, 34, 38, 0.15);
            color: #E57373;
            border: 1px solid rgba(155, 34, 38, 0.3);
        }
        
        .word-cell {
            font-weight: 600;
            color: #FFF;
            letter-spacing: 0.02em;
        }
        
        .pos-tag {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85em;
        }

        .notes-cell {
            font-size: 0.85em;
            color: var(--text-muted);
            max-width: 250px;
            line-height: 1.4;
        }
        
        .dictionary-wrapper {
            max-height: 600px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-gold) var(--bg-input);
        }

        .dictionary-wrapper::-webkit-scrollbar {
            width: 8px;
        }
        .dictionary-wrapper::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        .dictionary-wrapper::-webkit-scrollbar-thumb {
            background-color: var(--accent-gold);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .glass-container { padding: 20px; }
            th, td { padding: 10px 8px; font-size: 0.85rem; }
            .notes-cell { display: none; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Thalassian Lexicon</h1>
        <div class="subtitle">Complete Database of Elven Roots & Etymology</div>
    </div>

    <div class="nav-links">
        <a href="index.html">← Back to Translator</a>
        <a href="https://github.com/MikeKovetsky/thalassian" target="_blank">View on GitHub</a>
    </div>

    <div class="glass-container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by Elvish word, English meaning, or Source (e.g. 'sun', 'canon', 'felo')..." onkeyup="filterTable()">
        </div>

        <div class="dictionary-wrapper">
            <table id="lexiconTable">
                <thead>
                    <tr>
                        <th>Root / Word</th>
                        <th>Translation (EN)</th>
                        <th>POS</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th class="notes-cell">Etymology / Notes</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let lexiconData = [];

        window.onload = async () => {
            try {
                const response = await fetch('../data/lexicon.json');
                lexiconData = await response.json();
            } catch (error) {
                try {
                    const response = await fetch('https://raw.githubusercontent.com/MikeKovetsky/thalassian/main/data/lexicon.json');
                    lexiconData = await response.json();
                } catch (e) {
                    console.error("Failed to load lexicon.");
                }
            }
            
            // Sort alphabetically by Elvish word
            lexiconData.sort((a, b) => a.word.localeCompare(b.word));
            renderTable(lexiconData);
        };

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(entry => {
                const tr = document.createElement('tr');
                
                const badgeClass = entry.canon ? 'canon-true' : 'canon-false';
                const badgeText = entry.canon ? 'Canon' : 'Generated';
                const sourceText = entry.source ? entry.source : 'unknown';
                
                const enTranslation = entry.translation && entry.translation.en ? entry.translation.en : '-';
                
                tr.innerHTML = `
                    <td class="word-cell">${entry.word}</td>
                    <td>${enTranslation}</td>
                    <td class="pos-tag">${entry.pos || '-'}</td>
                    <td style="text-transform: capitalize; color: #ccc;">${sourceText}</td>
                    <td><span class="canon-badge ${badgeClass}">${badgeText}</span></td>
                    <td class="notes-cell">${entry.notes || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filtered = lexiconData.filter(entry => {
                const wordMatch = entry.word.toLowerCase().includes(input);
                const enMatch = entry.translation && entry.translation.en && entry.translation.en.toLowerCase().includes(input);
                const sourceMatch = entry.source && entry.source.toLowerCase().includes(input);
                const statusMatch = (entry.canon ? 'canon' : 'generated').includes(input);
                const notesMatch = entry.notes && entry.notes.toLowerCase().includes(input);
                
                return wordMatch || enMatch || sourceMatch || statusMatch || notesMatch;
            });
            renderTable(filtered);
        }
    </script>
</body>
</html>
